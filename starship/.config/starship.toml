"$schema" = 'https://starship.rs/config-schema.json'
#credits: https://github.com/leonlonsdale/robbyrusselish/blob/main/starship.toml
palette = "kanso"
command_timeout = 1000

format = """
$character\
$directory\
${custom.git_branch}\
${custom.git_status}\
${custom.jj_branch}\
${custom.jj_status}\
$python\
$nodejs\
$rust\
$golang"""
add_newline = false

[character]
success_symbol = "[➜](bold success)"
error_symbol = "[➜](bold error)"

[directory]
truncation_length = 1
read_only = " 🔒"
style = "directory"

[git_branch]
disabled = true

[git_status]
disabled = true

[custom.git_branch]
command = 'git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --short HEAD 2>/dev/null'
when = 'git rev-parse --git-dir >/dev/null 2>&1 && ! jj root --quiet >/dev/null 2>&1'
format = '[git:\(](symbol)[$output](branch)[\)](symbol) '

[custom.git_status]
command = '''
s=""
p=$(git status --porcelain 2>/dev/null)
ahead=$(git rev-list "@{u}.." 2>/dev/null | wc -l | tr -d ' ')
behind=$(git rev-list "..@{u}" 2>/dev/null | wc -l | tr -d ' ')
conflicted=$(echo "$p" | grep -c "^UU\|^AA\|^DD" 2>/dev/null || true)
untracked=$(echo "$p" | grep -c "^??" 2>/dev/null || true)
modified=$(echo "$p" | grep -c "^ [MD]" 2>/dev/null || true)
staged=$(echo "$p" | grep -c "^[MARCD] " 2>/dev/null || true)
renamed=$(echo "$p" | grep -c "^.R\|^R " 2>/dev/null || true)
deleted=$(echo "$p" | grep -c "^.D\|^D " 2>/dev/null || true)
[ "$conflicted" -gt 0 ] 2>/dev/null && s="${s}󰞇${conflicted}"
[ "$ahead" -gt 0 ] 2>/dev/null && s="${s}⇡${ahead}"
[ "$behind" -gt 0 ] 2>/dev/null && s="${s}⇣${behind}"
[ "$untracked" -gt 0 ] 2>/dev/null && s="${s}…${untracked}"
[ "$modified" -gt 0 ] 2>/dev/null && s="${s}$(printf '\xef\x90\x92')${modified}"
[ "$staged" -gt 0 ] 2>/dev/null && s="${s}+${staged}"
[ "$renamed" -gt 0 ] 2>/dev/null && s="${s}»${renamed}"
[ "$deleted" -gt 0 ] 2>/dev/null && s="${s}✘${deleted}"
printf '%s' "$s"
'''
when = 'git rev-parse --git-dir >/dev/null 2>&1 && ! jj root --quiet >/dev/null 2>&1'
format = '[\[$output\]](status) '

[custom.jj_branch]
command = '''
bookmark=$(jj log -r @ --no-graph -T 'bookmarks' 2>/dev/null | tr -d '*' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
change_id=$(jj log -r @ --no-graph -T 'change_id.shortest()' 2>/dev/null) || exit 1
ref="${bookmark:-$change_id}"
printf '%s' "$ref"
'''
when = 'jj root --quiet >/dev/null 2>&1'
format = '[jj:\(](jj_symbol)[$output](branch)[\)](jj_symbol) '

[custom.jj_status]
command = '''
s=""
unpushed_revset='((trunk() & ~root() & ::@-)::@-) ~ (trunk() & ~root() & ::@-)'
unpushed_count=$(jj log -r "$unpushed_revset" --no-graph --ignore-working-copy -T 'commit_id ++ "\n"' 2>/dev/null | wc -l | tr -d ' ')
if jj status 2>/dev/null | grep -q "Working copy changes:"; then
  wc_status=""
elif jj log -r @ --no-graph -T 'conflict' 2>/dev/null | grep -q "true"; then
  wc_status="󰞇"
else
  wc_status=""
fi
[ "$unpushed_count" -gt 0 ] 2>/dev/null && s="⇡${unpushed_count}"
s="${s}${wc_status}"
[ -n "$s" ] && printf '%s' "$s"
'''
when = 'jj root --quiet >/dev/null 2>&1'
format = '[$output](status) '

[python]
format = "[ $virtualenv ]($style) "
style = "python"

[nodejs]
symbol = " "
format = "[$symbol]($style) "
style = "node"

[rust]
symbol = " "
format = "[$symbol]($style) "
style = "rust"

[golang]
symbol = " "
format = "[$symbol]($style) "
style = "go"

